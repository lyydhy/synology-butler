name: android-release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.32.0
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze

      - name: Build APK (split per ABI)
        run: flutter build apk --release --split-per-abi --obfuscate --split-debug-info=build/app/outputs/symbols

      - name: Build App Bundle
        run: flutter build appbundle --release --obfuscate --split-debug-info=build/app/outputs/symbols

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-release
          path: |
            build/app/outputs/flutter-apk/*.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-release
          path: |
            build/app/outputs/bundle/release/*.aab

      - name: Upload symbols artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-obfuscation-symbols
          path: |
            build/app/outputs/symbols/**

      - name: Upload mapping artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-r8-mapping
          path: |
            android/app/build/outputs/mapping/release/**
