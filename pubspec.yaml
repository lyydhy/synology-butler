name: syno_keeper
description: 群晖管家 - Synology DSM 7+ mobile app scaffold
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.4.3+1
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3
  path_provider: ^2.1.5
  file_picker: ^8.0.7
  photo_manager: ^3.7.1
  video_player: ^2.9.2
  intl: ^0.20.2
  cryptography: ^2.7.0
  open_filex: ^4.7.0
  flutter_sharing_intent: ^2.0.4
  share_plus: ^10.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true
