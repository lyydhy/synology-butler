name: Android Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 配置 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 查看 Flutter 版本
        run: flutter --version

      - name: 安装依赖
        run: flutter pub get

      - name: 恢复 Android 签名文件
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/qunhui-mage-release.jks

      - name: 生成 key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=qunhui-mage-release.jks
          EOF

      - name: 代码分析
        continue-on-error: true
        run: flutter analyze

      - name: 构建 APK（按 ABI 分包）
        run: |
          flutter build apk \
            --release \
            --split-per-abi \
            --obfuscate \
            --split-debug-info=build/app/outputs/symbols

      - name: 上传 APK 到 Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/*.apk
          body: "🎉 群晖管家 v1.0.2 正式发布\n\n**新功能**\n\n- 文件多选复制/移动（完整功能：UI + API 接入）\n- 套件中心搜索重构：AppBar 搜索图标 → 独立搜索结果页 → 实时过滤\n- 传输 Tab 重命名为「传输」\n\n**优化**\n\n- CopyMove start/status API 接入，状态检查逻辑优化\n- Dio 超时调整：connect 3s、send 10s、receive 15s\n- 目录选择模式返回键行为修复\n\n**修复**\n\n- 删除废弃 api.json\n- flutter analyze 全部警告/错误清理（13 个文件、109 行无用代码）\n\n**CI/CD**\n\n- 修复 Gradle 构建静默失败问题\n- 移除 ABI splits，构建更稳定\n\n⚠️ 因原签名文件丢失，需卸载旧版本后重新安装"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传混淆符号
        uses: actions/upload-artifact@v4
        with:
          name: android-obfuscation-symbols
          path: build/app/outputs/symbols/**
          retention-days: 30

      - name: 上传 R8 mapping
        uses: actions/upload-artifact@v4
        with:
          name: android-r8-mapping
          path: android/app/build/outputs/mapping/release/**
          retention-days: 30
