name: Android Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 配置 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 查看 Flutter 版本
        run: flutter --version

      - name: 安装依赖
        run: flutter pub get

      - name: 恢复 Android 签名文件
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/qunhui-mage-release.jks

      - name: 生成 key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=qunhui-mage-release.jks
          EOF

      - name: 代码分析
        continue-on-error: true
        run: flutter analyze

      - name: 构建 APK（按 ABI 分包）
        run: |
          flutter build apk \
            --release

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-release
          path: build/app/outputs/flutter-apk/*.apk

      - name: 上传混淆符号
        uses: actions/upload-artifact@v4
        with:
          name: android-obfuscation-symbols
          path: build/app/outputs/symbols/**

      - name: 上传 R8 mapping
        uses: actions/upload-artifact@v4
        with:
          name: android-r8-mapping
          path: android/app/build/outputs/mapping/release/**
