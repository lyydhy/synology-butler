name: Android Dev Build

on:
  push:
    branches:
      - development
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 配置 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 查看 Flutter 版本
        run: flutter --version

      - name: 安装依赖
        run: flutter pub get

      - name: 构建 APK（按 ABI 分包）
        run: |
          flutter build apk \
            --release \
            --split-per-abi

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-dev
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 3
