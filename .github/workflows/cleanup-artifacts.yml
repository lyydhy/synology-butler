name: Cleanup Old Artifacts

on:
  schedule:
    - cron: '0 18 * * *'  # 每天北京时间 2:00 执行（UTC 18:00）
  workflow_dispatch:      # 也支持手动触发

permissions:
  actions: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 删除所有 android 相关的旧 artifact（保留最近3个版本）
          for artifact in android-apk-release android-obfuscation-symbols android-r8-mapping; do
            # 列出所有版本的 artifact，保留最新3个，删除其余
            ids=$(gh api --paginate repos/${{ github.repository }}/actions/artifacts \
              --jq "[.artifacts[] | select(.name == \"$artifact\") | .id] | .[3:]" 2>/dev/null)
            for id in $ids; do
              echo "Deleting $artifact id=$id"
              gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/$id
            done
          done
