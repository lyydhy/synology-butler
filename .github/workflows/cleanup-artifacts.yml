name: Cleanup Old Artifacts

on:
  schedule:
    - cron: '0 18 * * *'  # 每天北京时间 2:00 执行（UTC 18:00）
  workflow_dispatch:      # 也支持手动触发

permissions:
  actions: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            
            const keepNames = ['android-apk-release', 'android-obfuscation-symbols', 'android-r8-mapping'];
            
            for (const name of keepNames) {
              const matched = artifacts.data.artifacts.filter(a => a.name === name);
              // 按 created_at 倒序，保留最新3个
              const toDelete = matched.slice(3);
              for (const artifact of toDelete) {
                console.log(`Deleting ${artifact.id} (${artifact.name})`);
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id,
                });
              }
            }
